name: Update Voyager trajectory data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch JPL Horizons vectors
        run: node scripts/fetch-voyager-data.mjs
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/voyager_vectors.json
          git diff --cached --quiet || git commit -m "Update Voyager trajectory data"
          git push
