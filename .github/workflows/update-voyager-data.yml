name: Update Voyager trajectory data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"

permissions:
  contents: write

jobs:
  update-voyager-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Voyager data
        run: node scripts/fetch-voyager-data.mjs

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/voyager_vectors.json
          git diff --cached --quiet || git commit -m "Update Voyager trajectory data"
          git push
